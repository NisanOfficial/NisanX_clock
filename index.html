<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NisanX Clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#0ff;
  font-family:'Courier New', monospace;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#bg-canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}

.clock {
  font-size:clamp(60px, 15vw, 180px);
  font-weight:bold;
  text-shadow:0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
  animation:blink 2s infinite alternate;
  letter-spacing:5px;
}

.date {
  font-size:clamp(18px, 3vw, 28px);
  margin-top:10px;
  color:#0ff8;
  text-shadow:0 0 10px #0ff;
}

.weather {
  margin-top:30px;
  padding:20px 30px;
  border:1px solid #0ff5;
  border-radius:12px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  text-align:center;
  box-shadow:0 0 20px #0ff3;
}

.weather h3 {
  font-size:22px;
  margin-bottom:10px;
  color:#0ff;
}

.weather p {
  font-size:18px;
  margin:5px 0;
}

@keyframes blink {
 0% { opacity:1; }
 100% { opacity:0.7; }
}

.loading {
  color:#666;
  font-size:16px;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="clock" id="clock">00:00:00</div>
<div class="date" id="date">Loading date...</div>

<div class="weather" id="weather">
  <h3>Dhaka, Bangladesh</h3>
  <p class="loading">Loading weather...</p>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// Star background
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('bg-canvas'), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

const starCount = 1500;
const positions = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++) {
  positions[i*3] = (Math.random()-0.5)*25;
  positions[i*3+1] = (Math.random()-0.5)*25;
  positions[i*3+2] = (Math.random()-0.5)*25;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ color:0x00ff00, size:0.05, transparent:true, opacity:0.8 });
const stars = new THREE.Points(geometry, material);
scene.add(stars);

function animate() {
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0005;
  stars.rotation.x += 0.0002;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Clock
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12:false });
  const date = now.toLocaleDateString('en-US', { 
    weekday:'long', 
    year:'numeric', 
    month:'long', 
    day:'numeric' 
  });
  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}
setInterval(updateClock, 1000);
updateClock();

// Weather with random API key
const API_KEYS = [
  'd1ba7c71b74787bbb8649a10d4b651f4',
  'ec2fec93f72b555437a22ec81591956b'
];
const CITY = 'Dhaka';

async function getWeather() {
  const key = API_KEYS[Math.floor(Math.random() * API_KEYS.length)];
  
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${key}&units=metric`);
    if(!res.ok) throw new Error('API failed');
    
    const data = await res.json();
    document.getElementById('weather').innerHTML = `
      <h3>${data.name}, ${data.sys.country}</h3>
      <p>${Math.round(data.main.temp)}°C - ${data.weather[0].main}</p>
      <p>Humidity: ${data.main.humidity}% | Wind: ${data.wind.speed} m/s</p>
    `;
  } catch(err) {
    // If first key fails, try the other one
    const otherKey = API_KEYS.find(k => k !== key);
    try {
      const res2 = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${otherKey}&units=metric`);
      const data2 = await res2.json();
      document.getElementById('weather').innerHTML = `
        <h3>${data2.name}, ${data2.sys.country}</h3>
        <p>${Math.round(data2.main.temp)}°C - ${data2.weather[0].main}</p>
        <p>Humidity: ${data2.main.humidity}% | Wind: ${data2.wind.speed} m/s</p>
      `;
    } catch(err2) {
      document.getElementById('weather').innerHTML = '<p class="loading">Weather unavailable</p>';
    }
  }
}

getWeather();
setInterval(getWeather, 600000);
</script>

</body>
</html>
