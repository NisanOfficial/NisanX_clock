<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NisanX Clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#0ff;
  font-family:'Courier New', monospace;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

#bg-canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}

.clock {
  font-size:clamp(60px, 15vw, 180px);
  font-weight:bold;
  text-shadow:0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
  animation:blink 2s infinite alternate;
  letter-spacing:5px;
}

.date {
  font-size:clamp(16px, 2.5vw, 22px);
  margin-top:10px;
  line-height:1.6;
}

.date.en { color:#0ff; }
.date.bn { color:#0ff8; font-size:85%; }
.date.hijri { color:#0ff6; font-size:75%; }
.date.bn-time { color:#0ff4; font-size:65%; }

.weather {
  margin-top:25px;
  padding:18px 28px;
  border:1px solid #0ff5;
  border-radius:12px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  box-shadow:0 0 20px #0ff3;
}

.weather h3 {
  font-size:20px;
  margin-bottom:8px;
  color:#0ff;
}

.weather p {
  font-size:16px;
  margin:4px 0;
}

button {
  background:transparent;
  border:1px solid #0ff;
  color:#0ff;
  padding:8px 18px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Courier New', monospace;
  margin-top:20px;
  text-shadow:0 0 10px #0ff;
  transition:0.3s;
}
button:hover {
  background:rgba(0,255,255,0.1);
  box-shadow:0 0 20px #0ff;
}

@keyframes blink {
 0% { opacity:1; }
 100% { opacity:0.7; }
}

.loading { color:#666; font-size:15px; }
.eid { color:#ff0; text-shadow:0 0 15px #ff0; font-weight:bold; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="clock" id="clock">00:00:00</div>
<div class="date" id="date">Loading...</div>

<div class="weather" id="weather">
  <h3>Dhaka, Bangladesh</h3>
  <p class="loading">Loading weather...</p>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// Star background
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('bg-canvas'), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

const starCount = 1500;
const positions = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++) {
  positions[i*3] = (Math.random()-0.5)*25;
  positions[i*3+1] = (Math.random()-0.5)*25;
  positions[i*3+2] = (Math.random()-0.5)*25;
}
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ color:0x00ff00, size:0.05, transparent:true, opacity:0.8 });
const stars = new THREE.Points(geometry, material);
scene.add(stars);

function animate() {
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0005;
  stars.rotation.x += 0.0002;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Bangla date converter
function getBanglaDate(date) {
  const gYear = date.getFullYear();
  const gMonth = date.getMonth() + 1;
  const gDay = date.getDate();

  let bYear = gYear - 593;
  if(gMonth < 4 || (gMonth === 4 && gDay < 14)) bYear--;

  const bMonths = ["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];
  const bDays = ["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];

  let bMonth, bDay;
  if(gMonth >= 4 && gDay >= 14) {
    bMonth = gMonth - 4;
    bDay = gDay - 13;
  } else {
    bMonth = gMonth + 8;
    bDay = gDay + 17;
  }

  const dayName = bDays[date.getDay()];
  const bnNumbers = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];

  const toBanglaNum = (num) => String(num).replace(/\d/g, d => bnNumbers[d]);

  return {
    dayName: dayName,
    date: `${toBanglaNum(bDay)} ${bMonths[bMonth-1]} ${toBanglaNum(bYear)}`,
    year: toBanglaNum(bYear),
    time: date.toLocaleTimeString('bn-BD', { hour12:false })
  };
}

// Hijri date converter
function getHijriDate(date) {
  const gDay = date.getDate();
  const gMonth = date.getMonth() + 1;
  const gYear = date.getFullYear();

  const jd = Math.floor((1461 * (gYear + 4800 + Math.floor((gMonth - 14) / 12))) / 4) +
             Math.floor((367 * (gMonth - 2 - 12 * (Math.floor((gMonth - 14) / 12)))) / 12) -
             Math.floor((3 * Math.floor((gYear + 4900 + Math.floor((gMonth - 14) / 12)) / 100)) / 4) +
             gDay - 32075;

  const l = jd - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  const i = l - 10631 * n + 354;
  const j = (Math.floor((10985 - i) / 5316)) * (Math.floor((50 * i) / 17719)) + (Math.floor(i / 5670)) * (Math.floor((43 * i) / 15238));
  const i2 = i - Math.floor((30 - Math.floor(j / 30)) * (Math.floor(j / 30)) * (Math.floor(3 * j / 31) / 16)) - Math.floor((j / 16)) * (Math.floor((365 - Math.floor((22 * j) / 31)) / 7));
  const j2 = Math.floor(j / 30) + 12 * n + 1;

  const hijriYear = Math.floor((j2 + 12) / 12);
  const hijriMonth = j2 - 12 * (Math.floor(j2 / 12));
  const hijriDay = i2 - 29 * Math.floor(hijriMonth / 11);

  const months = ["Muharram","Safar","Rabi al-Awwal","Rabi al-Thani","Jumada al-Awwal","Jumada al-Thani",
                  "Rajab","Sha'ban","Ramadan","Shawwal","Dhu al-Qi'dah","Dhu al-Hijjah"];

  return { day: hijriDay, month: months[hijriMonth-1], year: hijriYear, full: `${hijriDay} ${months[hijriMonth-1]} ${hijriYear} AH` };
}

// Clock + Calendar
function updateClock() {
  const now = new Date();

  // English
  const timeEN = now.toLocaleTimeString('en-US', { hour12:false });
  const dateEN = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Bangla
  const bn = getBanglaDate(now);

  // Hijri
  const hijri = getHijriDate(now);

  // Check for Qurbani Eid - Dhu al-Hijjah 10
  let eidTag = '';
  if(hijri.month === "Dhu al-Hijjah" && hijri.day === 10) {
    eidTag = '<div class="eid">🕌 Qurbani Eid Mubarak!</div>';
  }

  document.getElementById('clock').textContent = timeEN;
  document.getElementById('date').innerHTML = `
    <div class="en">${dateEN}</div>
    <div class="bn">${bn.dayName}, ${bn.date} BS</div>
    <div class="hijri">${hijri.full}</div>
    <div class="bn-time">${bn.time}</div>
    ${eidTag}
  `;
}
setInterval(updateClock, 1000);
updateClock();

// Weather with random API key
const API_KEYS = [
  'd1ba7c71b74787bbb8649a10d4b651f4',
  'ec2fec93f72b555437a22ec81591956b'
];
const CITY = 'Dhaka';

async function getWeather() {
  const key = API_KEYS[Math.floor(Math.random() * API_KEYS.length)];
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${key}&units=metric`);
    if(!res.ok) throw new Error('API failed');
    const data = await res.json();
    document.getElementById('weather').innerHTML = `
      <h3>${data.name}, ${data.sys.country}</h3>
      <p>${Math.round(data.main.temp)}°C - ${data.weather[0].main}</p>
      <p>আর্দ্রতা: ${data.main.humidity}% | বাতাস: ${data.wind.speed} মি/সে</p>
    `;
  } catch(err) {
    document.getElementById('weather').innerHTML = '<p class="loading">আবহাওয়া পাওয়া যায়নি</p>';
  }
}
getWeather();
setInterval(getWeather, 600000);

// Random Quote
const quotes = [
  "সময় কারো জন্য থেমে থাকে না।",
  "Do it now. Later becomes never.",
  "ধৈর্য ধরো, সফলতা আসবেই।",
  "Every second is a chance to start again."
];
function updateQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  const weatherDiv = document.getElementById('weather');
  if(weatherDiv.innerHTML.includes('weather')) {
    weatherDiv.innerHTML += `<p style="font-size:14px; color:#0ff6; margin-top:10px;">"${q}"</p>`;
  }
}
setInterval(updateQuote, 15000);
updateQuote();

// Alarm
let alarmTime = null;
let alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
function setAlarm() {
  const time = prompt("অ্যালার্ম সেট করো [HH:MM] 24 ঘন্টা ফরম্যাটে:");
  if(time) {
    alarmTime = time;
    alert("অ্যালার্ম সেট হয়েছে " + time + " এ");
  }
}
setInterval(() => {
  const now = new Date().toTimeString().slice(0,5);
  if(alarmTime === now) {
    alarmSound.play();
    alert("⏰ অ্যালার্ম বাজছে!");
    alarmTime = null;
  }
}, 1000);

const btn = document.createElement('button');
btn.textContent = 'অ্যালার্ম সেট করো';
btn.onclick = setAlarm;
document.body.appendChild(btn);
</script>

</body>
</html>
