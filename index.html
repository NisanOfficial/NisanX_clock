<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NisanX Clock</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  font-family:'Courier New', monospace;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}
#bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
.clock {
  font-size:clamp(60px, 15vw, 180px);
  font-weight:bold;
  animation:blink 2s infinite alternate;
  letter-spacing:5px;
  transition:color 0.3s ease;
}
.date {
  font-size:clamp(16px, 2.5vw, 22px);
  margin-top:10px;
  line-height:1.6;
  transition:color 0.3s ease;
}
.weather {
  margin-top:25px;
  padding:18px 28px;
  border-radius:12px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  transition:all 0.3s ease;
}
.weather h3 { font-size:20px; margin-bottom:8px; }
.weather p { font-size:16px; margin:4px 0; }
button {
  background:transparent;
  padding:8px 18px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Courier New', monospace;
  margin-top:20px;
  transition:all 0.3s ease;
}
@keyframes blink { 0% { opacity:1; } 100% { opacity:0.7; } }
.loading { color:#666; font-size:15px; }
.eid { font-weight:bold; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="clock" id="clock">Loading...</div>
<div class="date" id="date"></div>
<div class="weather" id="weather">
  <h3>Dhaka, Bangladesh</h3>
  <p class="loading">Loading weather...</p>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let hue = 0;

// Star background
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('bg-canvas'), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

const starCount = 1500;
const positions = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++) {
  positions[i*3] = (Math.random()-0.5)*25;
  positions[i*3+1] = (Math.random()-0.5)*25;
  positions[i*3+2] = (Math.random()-0.5)*25;
}
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ size:0.05, transparent:true, opacity:0.8 });
const stars = new THREE.Points(geometry, material);
scene.add(stars);

function animate() {
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0005;
  stars.rotation.x += 0.0002;
  hue = (hue + 1.2) % 360;
  stars.material.color.setHSL(hue/360, 1, 0.5);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Corrected Bangla Date Converter
function getBanglaDate(date) {
  const gYear = date.getFullYear();
  const gMonth = date.getMonth() + 1; // 1-12
  const gDay = date.getDate();

  // Bangla year calculation
  let bYear = gYear - 593;
  if(gMonth < 4 || (gMonth === 4 && gDay < 14)) bYear--;

  // Bangla months
  const bMonths = ["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];
  const bDays = ["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];

  // Calculate Bangla month and day
  let bMonth, bDay;

  if(gMonth === 4 && gDay >= 14) {
    bMonth = 1; // Boishakh
    bDay = gDay - 13;
  } else if(gMonth === 5) {
    if(gDay <= 15) {
      bMonth = 1; // Boishakh
      bDay = gDay + 17;
    } else {
      bMonth = 2; // Joishtho
      bDay = gDay - 15;
    }
  } else if(gMonth === 6 && gDay <= 15) {
    bMonth = 2; // Joishtho
    bDay = gDay + 15;
  } else {
    // General calculation for other months
    const offsets = [0, 0, 0, 0, 13, 15, 15, 16, 16, 16, 15, 15, 15];
    bMonth = gMonth - 4;
    if(bMonth <= 0) bMonth += 12;
    bDay = gDay + offsets[gMonth];
  }

  const dayName = bDays[date.getDay()];
  const bnNumbers = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
  const toBanglaNum = (num) => String(num).replace(/\d/g, d => bnNumbers[d]);

  return {
    dayName: dayName,
    date: `${toBanglaNum(bDay)} ${bMonths[bMonth-1]} ${toBanglaNum(bYear)}`,
    time: date.toLocaleTimeString('bn-BD', { hour12:false })
  };
}

// Hijri date converter
function getHijriDate(date) {
  const gDay = date.getDate();
  const gMonth = date.getMonth() + 1;
  const gYear = date.getFullYear();
  const jd = Math.floor((1461 * (gYear + 4800 + Math.floor((gMonth - 14) / 12))) / 4) +
             Math.floor((367 * (gMonth - 2 - 12 * (Math.floor((gMonth - 14) / 12)))) / 12) -
             Math.floor((3 * Math.floor((gYear + 4900 + Math.floor((gMonth - 14) / 12)) / 100)) / 4) +
             gDay - 32075;
  const l = jd - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  const i = l - 10631 * n + 354;
  const j = (Math.floor((10985 - i) / 5316)) * (Math.floor((50 * i) / 17719)) + (Math.floor(i / 5670)) * (Math.floor((43 * i) / 15238));
  const i2 = i - Math.floor((30 - Math.floor(j / 30)) * (Math.floor(j / 30)) * (Math.floor(3 * j / 31) / 16)) - Math.floor((j / 16)) * (Math.floor((365 - Math.floor((22 * j) / 31)) / 7));
  const j2 = Math.floor(j / 30) + 12 * n + 1;
  const hijriYear = Math.floor((j2 + 12) / 12);
  const hijriMonth = j2 - 12 * (Math.floor(j2 / 12));
  const hijriDay = i2 - 29 * Math.floor(hijriMonth / 11);
  const months = ["Muharram","Safar","Rabi al-Awwal","Rabi al-Thani","Jumada al-Awwal","Jumada al-Thani","Rajab","Sha'ban","Ramadan","Shawwal","Dhu al-Qi'dah","Dhu al-Hijjah"];
  return { day: hijriDay, month: months[hijriMonth-1], year: hijriYear, full: `${hijriDay} ${months[hijriMonth-1]} ${hijriYear} AH` };
}

// Clock + Calendar
function updateClock() {
  const now = new Date();
  if(isNaN(now.getTime())) {
    document.getElementById('clock').textContent = "Error";
    return;
  }

  const timeEN = now.toLocaleTimeString('en-US', { hour12:false });
  const dateEN = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const bn = getBanglaDate(now);
  const hijri = getHijriDate(now);

  const color1 = `hsl(${hue}, 100%, 60%)`;
  const color2 = `hsl(${hue+40}, 100%, 70%)`;
  const color3 = `hsl(${hue+80}, 100%, 65%)`;
  const color4 = `hsl(${hue+120}, 100%, 60%)`;

  document.getElementById('clock').textContent = timeEN;
  document.getElementById('clock').style.color = color1;
  document.getElementById('clock').style.textShadow = `0 0 20px ${color1}, 0 0 40px ${color1}`;

  let eidTag = '';
  if(hijri.month === "Dhu al-Hijjah" && hijri.day === 10) {
    eidTag = `<div class="eid" style="color:hsl(${hue+180}, 100%, 60%); text-shadow:0 0 15px hsl(${hue+180}, 100%, 60%);">🕌 Qurbani Eid Mubarak!</div>`;
  }

  document.getElementById('date').innerHTML = `
    <div style="color:${color1}">${dateEN}</div>
    <div style="color:${color2}; font-size:85%;">${bn.dayName}, ${bn.date} BS</div>
    <div style="color:${color3}; font-size:75%;">${hijri.full}</div>
    <div style="color:${color4}; font-size:65%;">${bn.time}</div>
    ${eidTag}
  `;

  const weatherBox = document.getElementById('weather');
  weatherBox.style.border = `1px solid ${color1}80`;
  weatherBox.style.boxShadow = `0 0 20px ${color1}40`;
  weatherBox.querySelector('h3').style.color = color1;
}

setInterval(updateClock, 300);
updateClock();

// Weather
const API_KEYS = ['d1ba7c71b74787bbb8649a10d4b651f4','ec2fec93f72b555437a22ec81591956b'];
const CITY = 'Dhaka';
async function getWeather() {
  const key = API_KEYS[Math.floor(Math.random() * API_KEYS.length)];
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${key}&units=metric`);
    if(!res.ok) throw new Error('API failed');
    const data = await res.json();
    document.getElementById('weather').innerHTML = `
      <h3>${data.name}, ${data.sys.country}</h3>
      <p>${Math.round(data.main.temp)}°C - ${data.weather[0].main}</p>
      <p>আর্দ্রতা: ${data.main.humidity}% | বাতাস: ${data.wind.speed} মি/সে</p>
    `;
  } catch(err) {
    document.getElementById('weather').innerHTML = '<p class="loading">আবহাওয়া পাওয়া যায়নি</p>';
  }
}
getWeather();
setInterval(getWeather, 600000);

// Alarm
let alarmTime = null;
let alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
function setAlarm() {
  const time = prompt("অ্যালার্ম সেট করো [HH:MM] 24 ঘন্টা ফরম্যাটে:");
  if(time) { alarmTime = time; alert("অ্যালার্ম সেট হয়েছে " + time + " এ"); }
}
setInterval(() => {
  const now = new Date().toTimeString().slice(0,5);
  if(alarmTime === now) { alarmSound.play(); alert("⏰ অ্যালার্ম বাজছে!"); alarmTime = null; }
}, 1000);

const btn = document.createElement('button');
btn.textContent = 'অ্যালার্ম সেট করো';
btn.onclick = setAlarm;
document.body.appendChild(btn);

setInterval(() => {
  btn.style.color = `hsl(${hue+200}, 100%, 60%)`;
  btn.style.border = `1px solid hsl(${hue+200}, 100%, 60%)`;
  btn.style.textShadow = `0 0 10px hsl(${hue+200}, 100%, 60%)`;
}, 100);
</script>
</body>
</html>
